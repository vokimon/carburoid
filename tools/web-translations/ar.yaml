MOTTO: املأ أرخص، أقرب
DESCRIPTION: تطبيق مفتوح المصدر لأندرويد للعثور على محطات الوقود الرخيصة
KEYWORDS: محطة وقود, بنزين, ديزل, وقود, غازولين, أندرويد
FEATURE_OFFICIAL_DATA_TITLE: بيانات رسمية
FEATURE_OFFICIAL_DATA_DESCRIPTION: |
    نستخدم البيانات الرسمية التي ترسلها محطات الوقود إلى الجهات المنظمة.
    نحن ندعم حاليًا إسبانيا وفرنسا.
FEATURE_RELEVANT_STATIONS_TITLE: المحطات المهمة فقط
FEATURE_RELEVANT_STATIONS_DESCRIPTION: |
    يقوم Carburoid باستبعاد المحطات التي لا تحسن السعر مقارنة بالأقرب.
    هذا يقلل قائمة المرشحين من آلاف إلى بضع عشرات.
FEATURE_YOUR_CHOICE_TITLE: اختيارك
FEATURE_YOUR_CHOICE_DESCRIPTION: |
    تتحسن الأسعار كلما انتقلت لأسفل القائمة، لكنها تزيد أيضًا المسافة.
    الخيار لك في تحديد مدى الجدوى للمسافة مقابل التوفير.
FEATURE_ROUND_TRIP_DETOUR_MODES_TITLE: وضع الذهاب والإياب أو طريق التحويل
FEATURE_ROUND_TRIP_DETOUR_MODES_DESCRIPTION: |
    وضع “الذهاب والإياب” يأخذ فقط في الاعتبار المسافة بين موقعك ومحطة الوقود.
    عند تحديد نقطة وصول، يتم احتساب المسافة بما في ذلك التحويل إلى المحطة.
FEATURE_FREEDOM_AS_FEATURE_TITLE: الحرية كميزة
FEATURE_FREEDOM_AS_FEATURE_DESCRIPTION: |
    ترخّص AGPLv3 حريتك كمستخدمة.
    يتم الحفاظ على الكود من قبل المجتمع ويمكن لأي شخص مراجعته.
    لا تجسس. لا جمع بيانات. لا ترويج مدفوع لمحطات الوقود.
    يضمن F-Droid أن الملفات الثنائية تأتي من المصدر كما تم نشره.
FEATURE_FREEDOM_AS_FEATURE_ACTION_GITHUB: الكود المصدري
