MOTTO: Benzina al millor preu, més aprop
DESCRIPTION: App Open Source per Android per trobrar benzineres barates
KEYWORDS: benzinera, gasolinera, estació de servei, combustible, gasoil, diesel, benzina, gasolina
FEATURE_OFFICIAL_DATA_TITLE: Dades oficials
FEATURE_OFFICIAL_DATA_DESCRIPTION: |
    Fem servir dades oficials enviades per les benzineres al regulador.
    Ara mateix cobrim Espanya i França.
FEATURE_RELEVANT_STATIONS_TITLE: Només benzineres relevants
FEATURE_RELEVANT_STATIONS_DESCRIPTION: |
    Carburoid descarta les benzineres que no milloren el preu d'altres més properes.
    Això redueix la llista de candidates de milers a decenes.
FEATURE_YOUR_CHOICE_TITLE: Tu decideixes
FEATURE_YOUR_CHOICE_DESCRIPTION: |
    Els preus milloren segons vas baixant a la llista, però, també, puja la distància.
    Tu decideixes cóm de lluny vols anar que encara et pagui la pena l'estalvi.
FEATURE_ROUND_TRIP_DETOUR_MODES_TITLE: Round trip and Detour modes
FEATURE_ROUND_TRIP_DETOUR_MODES_DESCRIPTION: |
    Round trip mode considers just the distance between your position and the gas station.
    By setting a destination point, the detour distance is used instead.
FEATURE_FREEDOM_AS_FEATURE_TITLE: La llibertat com a funcionalitat
FEATURE_FREEDOM_AS_FEATURE_DESCRIPTION: |
    AGPLv3 protegeix la teva llibertat com a usuari.
    El codi el manté la comunitat i tothom pot auditar-ho.
    Sense espies. Sense recolecció de dades. Sense dopping pagat de benzineres.
    F-Droid assegura que els APK provenen del codi font tal com està publicat.
FEATURE_FREEDOM_AS_FEATURE_ACTION_GITHUB: Codi Font
FEATURE_FREEDOM_AS_FEATURE_ACTION_LICENSE: GNU Affero GPLv3 o posterior
FEATURE_TRANSLATIONS_TITLE: Traduccions
FEATURE_TRANSLATIONS_DESCRIPTION: |
    Posem cura especial en donar suport a les llengües minoritàries.
    És un esforç comunitari, tradueix la teva llengua amb Weblate.
FEATURE_TRANSLATIONS_ACTION_WEBLATE: Tradueix
