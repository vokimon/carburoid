app_name: "Carburoid"
motto: "Fill up cheaper, closer"
description: "An Open Source Android app to find cheap gas stations"
platforms: "Android"
author: "David García Garzón"
copyright_years: 2026
site_url: "https://carburoid.canvoki.net"
logo_url: "../assets/icon.svg"
splash_image: "../assets/splash.svg"
keywords: "gas stations, petrol, gasoil, diesel, gasoline, android"
main_screenshot: "../assets/01-screenshot-station-list-dark.png"
mastodon_url: https://masto.es/@carburoid
mastodin_id: "@carburoid@masto.es"
branding:
  primary_color: "#712b5e"
  secondary_color: "#d69999"
  tertiary_color: "#f0e0dd"
  background_color: "#525"
  muted_text_color: "#444444"
  border_color: "#dddddd"
  footer_background: "#111"
features:
  - title:
      en: "Official Data"
      ca: "Dades oficials"
    description:
      en: |
        We use official data sent by gas stations to the regulators.
        Currently supporting Spain and France.
      ca: |
        Fem servir dades oficials enviades per les benzineres al regulador.
        Ara mateix cobrim Espanya i França.
    image: "../assets/government.svg"
  - title:
      en: "Only relevant stations"
      ca: "Només benzineres rellevants"
    description:
      en: |
        Carburoid discards stations that do not improve the price of closer ones.
        This reduces the list of candidates from thousands to a few dozens.
    image: "../assets/skipirrelevant.svg"
  - title: "Your choice"
    description: |
        Prices improve as you scroll down the list, but distances also increase.
        It is up to you to decide how far is worth going for the savings.
    image: "../assets/yourchoice.svg"
  - title: "Round trip and Detour modes"
    description: |
        Round trip mode considers just the distance between your position and the gas station.
        By setting a destination point, the detour distance is used instead.
    image: "../assets/detour.svg"
  - title: "Freedom as a feature"
    description: |
        AGPLv3 protects your freedoms as user.
        Code is maintained in community and anyone can audit it.
        No spyware. No data collection. No paid station doping.
        F-Droid ensures that binaries come from the source as published.
    image: "../assets/agplv3.svg"
    actions:
    - link: https://github.com/vokimon/carburoid
      label: Source Code
      icon: ../assets/github.svg
    - link: https://github.com/vokimon/carburoid/blob/master/LICENSE
      label: Affero GPLv3 or later
      icon: ../assets/gnu.svg
  - title: "Translations"
    description: |
        Special care is taken to support minoritarian languages.
        This is a community effort, translate your own language with Weblate.
    image: "../assets/globe.svg"
    actions:
    - link: https://hosted.weblate.org/projects/carburoid/
      label: Translate
      icon: ../assets/weblate.svg
actions:
  - label: "Get it on F-Droid"
    link: "https://f-droid.org/packages/net.canvoki.carburoid/"
    icon: "../assets/fdroid.svg"
