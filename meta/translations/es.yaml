project_name: Carburoid
splash_motto: Llena al mejor precio, más cerca
short_description: Encuentra gasolineras en España, Francia y Portugal por precio y distancia.
full_description_md: |-
  ¿Cuánto hay que conducir para encontrar una gasolinera más barata?

  Carburoid muestra solo las pocas decenas de gasolineras que importan,
  eliminando miles que son más caras que otras más cercanas.
  A medida que bajas en la lista, el precio disminuye, pero la distancia aumenta.
  Tú decides hasta qué punto te compensa conducir para ahorrar.

  Funcionalidades:

  - 🏛️ Datos oficiales de los gobiernos: España, Francia, Portugal
  - 🎯 Solo gasolineras relevantes: o más cercanas o más baratas que otras
  - 🕒 Considera los horarios de apertura
  - 🗺️ Se integra con la aplicación de mapas que uses
  - 🌐 Traducciones al Español, Catalán, Vasco, Gallego, Aragonés…
  - ☀️ Temas oscuro y claro
keywords: gasolinera, estación de servicio, combustible, carburante, gasoil, diesel, gasolina
changes_1_5_0_md: |-
  Desviación de ruta, refinar la lista usando distancias reales por carretera y más idiomas.

  - ✨ Refinamiento progresivo de la lista utilizando distancias reales por carretera en lugar de distancias en línea recta.
  - ✨ Rutas de A a B utilizando la desviación para tomar la estación como distancia
  - ⚡️ Evite re‐cálculos redundantes al reconfigurar filtros, re‐posicionar productos y cambiar de producto.
  - ♻️ Representación de posición unificada (menos errores y regresiones al mezclar latitud y longitud).
  - 🌐 Traducción al francés (¡gracias, Sudoman y Florent Ruquoy!)
  - 🌐 Traducción al alemán (¡gracias, Zintor!)
  - 🌐 Traducción de metadatos y biblioteca compartida al alemán y ruso (¡Gracias, IA! 😛)
  - 🏗 Se eliminaron las dependencias no utilizadas
changes_1_4_4_md: |-
  Nuevo selector de ubicación y traducción al francés en curso

  - 🌐 Traducción FR 43%
  - ✨ Selector de ubicación: Mapa con tema oscuro en modo oscuro
  - ✨ Selector de ubicación: Mantener pulsado para establecer una ruta (deshabilitado para esta versión)
  - ✨ Selector de ubicación: Rutas de marco automático en el mapa (deshabilitado para esta versión)
  - ♻️ Selector de ubicación: usando maplibre-compose
  - 🐛 Selector de ubicación: Toma la ubicación correctamente cuando proviene del GPS.
  - ♻️ Detalles de la estación migrados a composición
