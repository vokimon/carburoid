project_name: Carburoid
splash_motto: Fill up cheaper, closer
short_description: Find gas stations by price and distance in Spain, France and Portugal.
full_description_md: |-
  How far should you go to find a cheaper gas station?

  Carburoid shows only the few dozen stations that matter.
  It hides thousands across the country that are more expensive than closer ones.
  So prices go down in the list as distance increases
  and you decide how far it’s worth driving for the savings.

  Features:

  - 🏛️ Official government data sources (Spain, France, Portugal)
  - 🎯 Only relevant gas stations: either closer or cheaper than others
  - 🕒 Smart about opening and closing hours
  - 🗺️ Integrates with your preferred map application
  - 🌐 Translations available in Spanish, Catalan, Basque, Galician, Aragonese…
  - ☀️ Dark and Light themes
keywords: gas station, petrol, gasoline, gasoil, diesel
