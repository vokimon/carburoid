project_name: Carburoid
splash_motto: Benzina al millor preu, més aprop
short_description: Troba benzineres a Espanya, França i Portugal per preu i distància.
full_description_md: |-
  Quant cal conduir per trobar una benzinera més barata?

  Carburoid mostra només les poques desenes de benziners que importen,
  eliminant milers que són més cares que d’altres més properes.
  A mesura que baixes a la llista, el preu disminueix, però la distància augmenta.
  Tu decideixes fins a quin punt et compensa conduir per estalviar.

  Funcionalitats:

  - 🏛️ Dades oficials dels governs: Espanya, França, Portugal
  - 🎯 Només benzineres rellevants: o més properes o més barates que d'altres.
  - 🕒 Considera els horaris d'apertura
  - 🗺️ S'integra amb l'aplicació de mapes que prefereixis
  - 🌐 Traduccions a l'Espanyol, Català, Basc, Gallec, Aragonés...
  - ☀️ Temes fosc i clar
keywords: benzinera, estació de servei, combustible, carburant, gasoil, diesel, gasolina, benzina
