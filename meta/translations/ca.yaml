project_name: Carburoid
splash_motto: Benzina al millor preu, més aprop
short_description: Troba benzineres a Espanya i França per preu i distància.
full_description_md: |
  Carburoid mostra només les benzineres que mereixen consideració.
  Ordenades per distància si una benzinera és més cara que les més properes, no es mostra.
  Això redueix la llista de milers a unes dotzenes.
  I de cara a escollir, pots baixar a la lista per millorar el preu fins que, per distància, no et compensi.

  Funcionalitats:

  - 🏛️ Dades oficials dels governs: Espanya i França
  - 🎯 Només benzineres rellevants: o més properes o més barates que d'altres.
  - 🕒 Considera els horaris d'apertura
  - 🗺️ S'integra amb l'aplicació de mapes que prefereixis
  - 🌐 Traduccions a l'Espanyol, Català, Basc, Gallec, Aragonés...
  - ☀️ Temes fosc i clar
keywords: benzinera, estació de servei, combustible, carburant, gasoil, diesel, gasolina, benzina
