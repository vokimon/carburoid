name: 💥 Crash Report (Auto)
description: Automatic crash report generated by the app.
title: '💥 Crash: {{ exception_type }} thrown in {{ current_activity }}'
labels:
  - crash
  - auto-reported
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        This report was generated automatically by the app after a crash.

        To help us fix it faster, please describe what you were doing when the app crashed.
  - type: textarea
    id: additional
    attributes:
      label: What were you doing?
      description: |
        Please describe the action that triggered the crash.
        Example: "I opened Settings and tapped 'Reset data'."
      placeholder: |
        I was...
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        The following technical details were captured automatically.
        You don't need to fill them unless you notice something wrong.
  - type: input
    id: app_version
    attributes:
      label: App Version
      description: Which version of the app crashed?
      placeholder: 2.4.1
    validations:
      required: true
  - type: input
    id: android_version
    attributes:
      label: Android Version
      description: Android version running on your device
      placeholder: Android 14
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device Model
      description: Your device model (e.g., Pixel 6, Samsung S21)
      placeholder: Pixel 7
    validations:
      required: true
  - type: input
    id: install_method
    attributes:
      label: Installation Method
      description: How did you install the app?
      placeholder: F-Droid
    validations:
      required: true
  - type: input
    id: current_activity
    attributes:
      label: Current Activity
      description: Screen active at the time of crash
      placeholder: MapScreenActivity
    validations:
      required: false
  - type: input
    id: exception_type
    attributes:
      label: Exception Type
      description: Class name of the thrown exception
      placeholder: NullPointerException
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Full Crash Log
      description: Complete stack trace and technical details
      render: text
    validations:
      required: true
