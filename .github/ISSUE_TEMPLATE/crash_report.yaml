name: 💥 Crash Report (Auto)
description: Automatic crash report generated by the app.
title: '💥 Crash: {{ current_activity }} • {{ exception_type }}'
labels:
  - crash
  - auto-reported
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        This report was generated automatically by the app after a crash.

        Maintainers will review the stack trace and metadata below.
        If you can add context (what you were doing), please fill "Additional Information".
  - type: dropdown
    id: app_version
    attributes:
      label: App Version
      description: Which version of the app crashed?
      options:
        - 1.6.2
        - 1.6.1
        - 1.6.0
        - 1.5.1
        - 1.5.0
        - 1.4.4
        - 1.4.3
        - 1.4.2
        - 1.4.1
        - 1.4.0
        - 1.3.3
        - 1.3.2
        - 1.3.1
        - 1.3.0
        - 1.2.3
        - 1.2.2
        - 1.2.1
        - 1.2.0
        - 1.1.0
        - 1.0.3
        - 1.0.2
        - 1.0.1
        - 1.0.0
    validations:
      required: true
  - type: dropdown
    id: android_version
    attributes:
      label: Android Version
      description: Android version running on your device
      options:
        - Android 16
        - Android 15
        - Android 14
        - Android 13
        - Android 12
        - Android 11
        - Android 10
        - Android 9
        - Android 8.1
        - Android 8.0
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device Model
      description: Your device model (e.g., Pixel 6, Samsung S21)
      placeholder: Pixel 7
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: Installation Method
      options:
        - F-Droid
        - GitHub Release APK
        - Built from Source
        - Other
    validations:
      required: true
  - type: input
    id: current_activity
    attributes:
      label: Current Activity
      description: Screen active at the time of crash
      placeholder: MapScreenActivity
    validations:
      required: false
  - type: input
    id: exception_type
    attributes:
      label: Exception Type
      description: Class name of the thrown exception
      placeholder: NullPointerException
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Full Crash Log
      description: Complete stack trace and technical details
      render: text
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: What were you doing when it crashed? Any extra context?
      placeholder: |
        I opened the settings and tapped "Reset data".
    validations:
      required: false
